<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My account &middot; TargetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #f7f8fb; color: #1c2233; }
        .navbar-brand { font-weight: 800; letter-spacing: -0.02em; }
        .brand-dot { color: #ff5a36; }
        .panel {
            background: #fff;
            border: 1px solid #e7eaf3;
            border-radius: 18px;
            padding: 1.75rem;
        }
        .panel h5 { font-weight: 700; }
        .stat { background: #f1f3f9; border-radius: 12px; padding: 1rem 1.25rem; }
        .stat .value { font-size: 1.5rem; font-weight: 800; }
        .btn-primary { background: #ff5a36; border-color: #ff5a36; }
        .btn-primary:hover { background: #e64b2a; border-color: #e64b2a; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">Target<span class="brand-dot">.</span>Shop</a>
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="/">Shop</a></li>
                <li class="nav-item"><a class="nav-link" href="/about_us.html">About Us</a></li>
                <li class="nav-item"><button id="logout-btn" class="btn btn-outline-secondary px-3">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="mb-1" style="font-weight:800;letter-spacing:-0.02em;">My account</h2>
                <p class="text-muted mb-0">Manage your TargetShop profile and preferences.</p>
            </div>
            <span class="badge bg-light text-dark">Standard member</span>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="stat"><small class="text-muted">Orders</small><div class="value">0</div></div></div>
            <div class="col-md-4"><div class="stat"><small class="text-muted">Wishlist</small><div class="value">0</div></div></div>
            <div class="col-md-4"><div class="stat"><small class="text-muted">Reward points</small><div class="value">25</div></div></div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="panel">
                    <h5>Profile</h5>
                    <p class="text-muted small">Update your personal information.</p>
                    <form onsubmit="event.preventDefault();alert('Saved.');">
                        <div class="mb-3">
                            <label class="form-label">Display name</label>
                            <input class="form-control" value="Archer" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input class="form-control" value="+91 99999 00000" />
                        </div>
                        <button class="btn btn-primary">Save changes</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel">
                    <h5>Security</h5>
                    <p class="text-muted small">Update your password.</p>
                    <form onsubmit="event.preventDefault();alert('Password updated.');">
                        <div class="mb-3">
                            <label class="form-label">Current password</label>
                            <input class="form-control" type="password" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New password</label>
                            <input class="form-control" type="password" />
                        </div>
                        <button class="btn btn-primary">Update password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("logout-btn").addEventListener("click", function () {
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";
            window.location.href = "/login.html";
        });
    </script>
</body>
</html>
