<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin login &middot; TargetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f1422; color: #e9ecf5; min-height: 100vh; }
        .navbar { background: #0f1422 !important; }
        .navbar-brand { font-weight: 800; letter-spacing: -0.02em; color: #fff !important; }
        .brand-dot { color: #ff5a36; }
        .auth-shell { max-width: 440px; margin: 6rem auto; padding: 0 1rem; }
        .auth-card {
            background: #1a2034;
            border: 1px solid #283050;
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 18px 40px -20px rgba(0,0,0,.5);
        }
        .auth-card h3 { font-weight: 800; letter-spacing: -0.02em; }
        .form-control { background: #0f1422; border-color: #283050; color: #fff; }
        .form-control:focus { background: #0f1422; border-color: #ff5a36; color: #fff; box-shadow: none; }
        .btn-primary { background: #ff5a36; border-color: #ff5a36; }
        .btn-primary:hover { background: #e64b2a; border-color: #e64b2a; }
        .alert-soft { border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">Target<span class="brand-dot">.</span>Shop &middot; Admin</a>
        </div>
    </nav>

    <div class="auth-shell">
        <div class="auth-card">
            <h3 class="mb-1">Admin login</h3>
            <p class="text-muted">Restricted area. Authorized staff only.</p>

            <form id="admin-login" novalidate>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required />
                </div>
                <div id="msg"></div>
                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("admin-login").addEventListener("submit", async function (e) {
            e.preventDefault();
            const msg = document.getElementById("msg");
            msg.innerHTML = '';
            const data = Object.fromEntries(new FormData(e.target).entries());
            try {
                const resp = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                let text = "Invalid Credentials";
                try {
                    const json = await resp.json();
                    if (json && json.error) text = json.error;
                } catch (_) { /* non-JSON response */ }
                msg.innerHTML = '<div class="alert alert-danger alert-soft py-2 mb-3">' + text + '</div>';
            } catch (err) {
                msg.innerHTML = '<div class="alert alert-danger alert-soft py-2 mb-3">Network error</div>';
            }
        });
    </script>
</body>
</html>
