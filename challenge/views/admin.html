<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Portal &middot; NEXORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; color: #111; }
        .brand { font-weight: 800; letter-spacing: -0.02em; }
        .field-wrap { position: relative; }
        .field-wrap > svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
        .field { width: 100%; height: 48px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0 14px 0 44px; outline: none; font-size: 14px; background: #fff; }
        .field:focus { border-color: #111; box-shadow: 0 0 0 3px rgba(17,17,17,0.06); }
        .pill-btn { width: 100%; height: 52px; border-radius: 999px; font-weight: 700; letter-spacing: 0.06em; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen bg-white flex flex-col">
    <header class="border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 lg:px-10 h-20 flex items-center">
            <a href="/" class="brand text-2xl">NEXORA<span class="text-black">.</span></a>
        </div>
    </header>

    <main class="flex-1 bg-gray-50/70 flex items-center justify-center px-4 py-16">
        <section class="w-full max-w-md bg-white rounded-2xl shadow-[0_25px_60px_-30px_rgba(0,0,0,0.25)] border border-gray-100 px-8 py-10 sm:px-10 sm:py-12">
            <h1 class="text-2xl text-center font-semibold tracking-tight">ADMIN PORTAL LOGIN</h1>

            <form id="admin-login" class="mt-8" novalidate>
                <label class="block text-xs font-semibold tracking-wider text-gray-700">EMAIL ADDRESS</label>
                <div class="field-wrap mt-2">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="m4 8 8 6 8-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <input type="email" name="email" class="field" placeholder="admin@nexora.com" required />
                </div>

                <label class="block text-xs font-semibold tracking-wider text-gray-700 mt-5">PASSWORD</label>
                <div class="field-wrap mt-2">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke-linecap="round"/><circle cx="12" cy="15.5" r="1.4" fill="currentColor"/></svg>
                    <input type="password" name="password" class="field" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required />
                </div>

                <div id="admin-msg" class="mt-4"></div>

                <button class="pill-btn bg-black text-white mt-6" type="submit">LOGIN</button>

                <div class="text-center mt-5">
                    <a href="#" onclick="event.preventDefault()" class="text-sm text-rose-700 underline">Forgot Password?</a>
                </div>
            </form>
        </section>
    </main>

    <script>
        document.getElementById("admin-login").addEventListener("submit", async function (e) {
            e.preventDefault();
            const msg = document.getElementById("admin-msg");
            msg.innerHTML = '';
            const data = Object.fromEntries(new FormData(e.target).entries());
            try {
                const resp = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                let text = "Invalid Credentials";
                try {
                    const json = await resp.json();
                    if (json && json.error) text = json.error;
                } catch (_) { /* non-JSON response */ }
                msg.innerHTML = '<div class="border border-red-200 bg-red-50 text-red-700 rounded-lg px-3 py-2 text-sm">' + text + '</div>';
            } catch (err) {
                msg.innerHTML = '<div class="border border-red-200 bg-red-50 text-red-700 rounded-lg px-3 py-2 text-sm">Network error</div>';
            }
        });
    </script>
</body>
</html>
