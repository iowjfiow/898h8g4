<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login &middot; TargetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #f7f8fb; color: #1c2233; min-height: 100vh; }
        .navbar-brand { font-weight: 800; letter-spacing: -0.02em; }
        .brand-dot { color: #ff5a36; }
        .auth-shell { max-width: 460px; margin: 4rem auto; padding: 0 1rem; }
        .auth-card {
            background: #fff;
            border: 1px solid #e7eaf3;
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 18px 40px -20px rgba(28,34,51,.18);
        }
        .auth-card h3 { font-weight: 800; letter-spacing: -0.02em; }
        .nav-tabs .nav-link { font-weight: 600; color: #6c7793; }
        .nav-tabs .nav-link.active { color: #1c2233; border-color: #e7eaf3 #e7eaf3 #fff; }
        .btn-primary { background: #ff5a36; border-color: #ff5a36; }
        .btn-primary:hover { background: #e64b2a; border-color: #e64b2a; }
        .alert-soft { border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">Target<span class="brand-dot">.</span>Shop</a>
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="/">Shop</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-shell">
        <div class="auth-card">
            <h3 class="mb-1">Welcome back</h3>
            <p class="text-muted">Login to your TargetShop account, or create one in seconds.</p>

            <ul class="nav nav-tabs mt-4" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-tab" type="button">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup-tab" type="button">Create account</button>
                </li>
            </ul>

            <div class="tab-content pt-4">
                <div class="tab-pane fade show active" id="login-tab" role="tabpanel">
                    <form id="login-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required />
                        </div>
                        <div id="login-msg"></div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="signup-tab" role="tabpanel">
                    <form id="signup-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" id="signup-email" required />
                            <small id="email-feedback" class="text-muted"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required />
                        </div>
                        <div id="signup-msg"></div>
                        <button class="btn btn-primary w-100" type="submit">Create account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setCookie(name, value) {
            document.cookie = name + "=" + value + "; path=/; SameSite=Lax";
        }

        function showMsg(elId, text, kind) {
            const el = document.getElementById(elId);
            el.innerHTML = '<div class="alert alert-' + kind + ' alert-soft py-2 mb-3">' + text + '</div>';
        }

        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            try {
                const resp = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const json = await resp.json();
                if (resp.ok && json.token) {
                    setCookie("token", json.token);
                    showMsg("login-msg", "Logged in. Redirecting...", "success");
                    setTimeout(function () { window.location.href = "/dashboard"; }, 400);
                } else {
                    showMsg("login-msg", json.error || "Invalid Credentials", "danger");
                }
            } catch (err) {
                showMsg("login-msg", "Network error", "danger");
            }
        });

        const signupEmailInput = document.getElementById("signup-email");
        const emailFeedback = document.getElementById("email-feedback");

        signupEmailInput.addEventListener("blur", async function () {
            const email = signupEmailInput.value.trim();
            if (!email) { emailFeedback.textContent = ""; return; }
            try {
                const resp = await fetch("/api/validate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email })
                });
                if (resp.ok) {
                    emailFeedback.textContent = "This email is available.";
                    emailFeedback.className = "text-success";
                } else {
                    emailFeedback.textContent = "Could not validate this email. Try a different address.";
                    emailFeedback.className = "text-danger";
                }
            } catch (err) {
                emailFeedback.textContent = "";
            }
        });

        document.getElementById("signup-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            try {
                const resp = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const json = await resp.json();
                if (resp.ok && json.token) {
                    setCookie("token", json.token);
                    showMsg("signup-msg", "Account created. Redirecting...", "success");
                    setTimeout(function () { window.location.href = "/dashboard"; }, 400);
                } else {
                    showMsg("signup-msg", json.error || "Could not create account", "danger");
                }
            } catch (err) {
                showMsg("signup-msg", "Network error", "danger");
            }
        });
    </script>
</body>
</html>
